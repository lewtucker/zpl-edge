services:

  zpl-proxy:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data                              # observations.db + requests.jsonl
      - ./certs:/app/certs                            # mitmproxy CA cert (persisted)
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Docker identity resolution
      - ./config/proxy.yaml:/app/config/proxy.yaml:ro
    environment:
      - LOG_LEVEL=INFO
      - ZPL_CONFIG=/app/config/proxy.yaml
    networks:
      - lab-net
    restart: unless-stopped

